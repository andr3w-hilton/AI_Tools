name: Wake Mira

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  wake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r "Machine Learning/mira/requirements.txt"

      - name: Wake Mira
        env:
          ANTHROPIC_API_KEY: ${{ secrets.MIRA_ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.MIRA_TELEGRAM_CHAT_ID }}
        run: |
          cd "Machine Learning/mira"
          python mira.py

      - name: Commit memory
        run: |
          git config user.name "Mira"
          git config user.email "mira@noreply.github.com"
          git add "Machine Learning/mira/memory/"
          git diff --staged --quiet || git commit -m "Mira: daily memory $(date -u +%Y-%m-%d)"
          git pull --rebase origin master
          git push
